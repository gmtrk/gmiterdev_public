app = "gmiter"
primary_region = "fra"

[build]

[env]
  ALLOWED_HOSTS = "gmiter.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://gmiter.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  release_command = "python manage.py migrate --noinput && python manage.py seed_games"
