{% extends 'master.html' %}
{% load static %}

{% block title %}Sketchy{% endblock %}

{% block extra_head %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Shantell+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'sketchy/css/sketchy.css' %}">
{% endblock %}

{% block body_class %}sk-body{% endblock %}

{% block content %}
{% csrf_token %}
<div class="sk-page">
  <div class="sk-topbar">
    <div class="sk-title">Sketchy</div>
    <div class="sk-modes">
      <button class="sk-mode sk-mode--active" data-mode="sandbox">Sandbox</button>
      <button class="sk-mode" data-mode="challenge">Challenge</button>
    </div>
  </div>

  <!-- challenge header (hidden in sandbox) -->
  <div class="sk-chhead" hidden>
    <div class="sk-prompt">draw a <span class="sk-prompt__word">—</span></div>
    <div class="sk-score">score <span id="sk-score">0</span></div>
    <div class="sk-timerwrap"><div class="sk-timer"><i id="sk-timer-fill"></i></div><span id="sk-timer-sec">20s</span></div>
  </div>

  <div class="sk-main">
    <div class="sk-left">
      <canvas id="sk-canvas" class="sk-canvas"></canvas>
      <div class="sk-tools">
        <button id="sk-clear" class="sk-chip">Clear ✗</button>
        <button id="sk-skip" class="sk-chip" hidden>Skip ⤳</button>
      </div>
    </div>
    <div class="sk-rail">
      <div class="sk-headline" id="sk-headline">draw something…</div>
      <div id="sk-guesses"></div>
      <div class="sk-lb-wrap">
        <div class="sk-lb-title">🏆 leaderboard</div>
        <div id="sk-lb"></div>
        <div class="sk-lb-join">
          <span id="sk-lb-status"></span>
          <input id="sk-lb-initials" maxlength="3" placeholder="ABC" disabled>
          <button id="sk-lb-join" class="sk-chip" disabled>Join 🏆</button>
        </div>
      </div>
    </div>
  </div>

  <!-- toast + recap mounts (filled by main.js) -->
  <div id="sk-toast" class="sk-toast" hidden></div>
  <div id="sk-recap" class="sk-recap" hidden></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0"></script>
<script type="module" src="{% static 'sketchy/js/main.js' %}"></script>
{% endblock %}
